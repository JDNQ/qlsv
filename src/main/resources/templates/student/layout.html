<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; }
        .sidebar {
            width: 250px;
            background: #0d6efd;
            color: white;
            height: 100vh;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4>Sinh viên</h4>
    <a href="/student/info">Thông tin</a>
    <a href="/student/result">Kết quả</a>
    <a href="/student/schedule">Lịch học</a>
    <a href="/student/debt">Công nợ</a>
    <a href="/student/register">Đăng ký học phần</a>
</div>

<div class="content">
    <div th:replace="${content}"></div>
</div>

</body>
</html>
